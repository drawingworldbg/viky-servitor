<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вики - Виртуален сервитьор</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; text-align: center; background: #f0f8ff; margin: 0; padding: 20px; color: #333; }
        .container { max-width: 600px; margin: auto; background: white; padding: 25px; border-radius: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        h1 { margin: 10px 0 5px; font-size: 32px; color: #2e7d32; }
        p { color: #666; margin-bottom: 20px; }
        
        /* Стил за картинката */
        .avatar-container { margin: 20px auto; width: 220px; height: 220px; border-radius: 50%; overflow: hidden; border: 6px solid #4CAF50; box-shadow: 0 5px 15px rgba(0,0,0,0.2); }
        .avatar-container img { width: 100%; height: 100%; object-fit: cover; }

        button { font-size: 22px; padding: 18px 45px; background: #4CAF50; color: white; border: none; border-radius: 50px; cursor: pointer; transition: all 0.3s; box-shadow: 0 4px 15px rgba(76, 175, 80, 0.4); }
        button:hover { background: #45a049; transform: scale(1.05); }
        button:active { transform: scale(0.98); }

        .status { font-size: 18px; margin: 20px; font-weight: bold; color: #1976D2; min-height: 24px; }
        
        .box { background: #f9f9f9; padding: 15px; margin: 15px auto; border-radius: 15px; text-align: left; border-left: 6px solid #4CAF50; }
        .label { font-size: 12px; text-transform: uppercase; color: #888; font-weight: bold; margin-bottom: 5px; }
        .text-content { font-size: 18px; line-height: 1.5; }
    </style>
</head>
<body>

<div class="container">
    <h1>👋 Аз съм Вики</h1>
    <p>Вашият виртуален сервитьор</p>
    
    <div class="avatar-container">
        <img src="https://img.freepik.com/free-vector/waitress-concept-illustration_114360-19213.jpg" alt="Вики">
    </div>

    <button onclick="startListening()">🎤 Говори с мен</button>
    
    <div class="status" id="status">Натисни бутона и поръчай</div>
    
    <div class="box">
        <div class="label">Ти каза:</div>
        <div id="heard" class="text-content">...</div>
    </div>
    
    <div class="box">
        <div class="label">Вики отговаря:</div>
        <div id="response" class="text-content" style="color:#2e7d32; font-weight: 500;">...</div>
    </div>
</div>

<script>
    // --- ОСНОВНИ НАСТРОЙКИ ---
    const GEMINI_KEY = "AIzaSyDz8HVkb8_1_hwdOe2BKDjowr14ovxA-fk"; // <--- ЗАМЕНИ ТУК (внимавай да няма интервали!)
    const MODEL_URL = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${GEMINI_KEY}`;

    const statusEl = document.getElementById('status');
    const heardEl = document.getElementById('heard');
    const responseEl = document.getElementById('response');

    // Инструкции за Вики
    const systemPrompt = `Ти си Вики - любезна сервитьорка. 
    МЕНЮ: Шопска салата (8.90 лв), Пилешка супа (6.50 лв), Цезар (11.90 лв), Пържола (19.90 лв), Пиле на скара (14.50 лв), Веган боул (12.90 лв), Спагети (13.90 лв), Тирамису (7.50 лв), Лимонада (4.50 лв).
    
    ПРАВИЛА:
    1. ГОВОРИ САМО НА БЪЛГАРСКИ.
    2. Потвърждавай поръчката и винаги питай "Желаете ли още нещо или някой друг на масата иска да поръча?".
    3. Приеми поръчката ОКОНЧАТЕЛНО само ако клиентът каже, че е готов или няма повече поръчки.
    4. Отговаряй кратко и професионално.`;

    function startListening() {
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (!SpeechRecognition) {
            alert("Браузърът Ви не поддържа гласово разпознаване.");
            return;
        }

        const recognition = new SpeechRecognition();
        recognition.lang = 'bg-BG';

        recognition.onstart = () => {
            statusEl.textContent = "🎤 Слушам Ви...";
        };

        recognition.onresult = (event) => {
            const transcript = event.results[0][0].transcript;
            heardEl.textContent = transcript;
            askGemini(transcript);
        };

        recognition.onerror = () => {
            statusEl.textContent = "Опа, не Ви чух. Опитайте пак!";
        };

        recognition.start();
    }

    async function askGemini(userInput) {
        statusEl.textContent = "🤔 Вики мисли...";

        const payload = {
            contents: [{
                parts: [{ text: systemPrompt + "\nКлиентът каза: " + userInput }]
            }]
        };

        try {
            const response = await fetch(MODEL_URL, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(payload)
            });

            const data = await response.json();

            if (data.error) {
                console.error("Грешка от Google:", data.error.message);
                responseEl.textContent = "Извинявайте, имам проблем с връзката към кухнята. (Проверете API ключа)";
                return;
            }

            if (data.candidates && data.candidates[0].content) {
                const aiText = data.candidates[0].content.parts[0].text;
                responseEl.textContent = aiText;
                statusEl.textContent = "Вики отговори:";
                speak(aiText);
            }

        } catch (error) {
            console.error("Грешка при заявката:", error);
            responseEl.textContent = "Имам малък технически проблем. Може ли да повторите?";
        }
    }

    function speak(text) {
        const synth = window.speechSynthesis;
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = 'bg-BG';
        
        // Автоматично пускане на микрофона след края на говоренето
        utterance.onend = () => {
            setTimeout(startListening, 1000);
        };

        synth.speak(utterance);
    }
</script>

</body>
</html>
